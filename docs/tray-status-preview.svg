<svg xmlns="http://www.w3.org/2000/svg" width="820" height="260" viewBox="0 0 820 260" role="img" aria-labelledby="title desc">
  <title id="title">Mic Tray Mute tray status preview</title>
  <desc id="desc">Preview of muted and active microphone tray states.</desc>
  <rect width="820" height="260" rx="20" fill="#0f1217"/>
  <text x="40" y="54" fill="#f4f6f8" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Mic Tray Mute</text>
  <text x="40" y="88" fill="#aeb7c2" font-family="Segoe UI, Arial, sans-serif" font-size="16">Persistent microphone state in the Windows tray</text>

  <g transform="translate(54 125)">
    <rect width="314" height="86" rx="12" fill="#171c24" stroke="#2e3644"/>
    <circle cx="48" cy="43" r="25" fill="#5f6b7a"/>
    <rect x="41" y="22" width="14" height="35" rx="7" fill="#ffffff"/>
    <rect x="45" y="55" width="6" height="16" rx="3" fill="#ffffff"/>
    <rect x="34" y="69" width="28" height="5" rx="2.5" fill="#ffffff"/>
    <line x1="29" y1="25" x2="67" y2="63" stroke="#ff5252" stroke-width="7" stroke-linecap="round"/>
    <text x="92" y="37" fill="#f4f6f8" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">Muted</text>
    <text x="92" y="64" fill="#aeb7c2" font-family="Segoe UI, Arial, sans-serif" font-size="15">Input is off</text>
  </g>

  <g transform="translate(452 125)">
    <rect width="314" height="86" rx="12" fill="#171c24" stroke="#2e3644"/>
    <circle cx="48" cy="43" r="25" fill="#dc2020"/>
    <rect x="41" y="22" width="14" height="35" rx="7" fill="#ffffff"/>
    <rect x="45" y="55" width="6" height="16" rx="3" fill="#ffffff"/>
    <rect x="34" y="69" width="28" height="5" rx="2.5" fill="#ffffff"/>
    <text x="92" y="37" fill="#f4f6f8" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">Active</text>
    <text x="92" y="64" fill="#aeb7c2" font-family="Segoe UI, Arial, sans-serif" font-size="15">Input is on</text>
  </g>
</svg>
